name: Karaoke Chatbot Test CI

on:
  push:
    branches: [ "main", "master" ] # main이든 master든 코드가 올라오면 실행
  pull_request:
    branches: [ "main", "master" ]

jobs:
  run-chatbot-test:
    runs-on: ubuntu-latest

    steps:
    - name: Check out repository code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

    # [수정된 핵심 단계] 테스트 파일 대신, 서버가 문법 오류 없이 구동되는지 직접 검증합니다.
    - name: Verify FastAPI App Syntax and Startup
      env:
        OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        ADMIN_API_KEY: ${{ secrets.ADMIN_API_KEY }}
      run: |
        # uvicorn을 백그라운드로 실행하여 main.py에 문법 에러나 초기화 에러가 없는지 5초간 테스트합니다.
        # 만약 코드에 오타가 있거나 라이브러리가 없으면 이 단계에서 빨간 불이 뜹니다.
        timeout 5 uvicorn main:app --host 127.0.0.1 --port 8000 || [ $? -eq 124 ]

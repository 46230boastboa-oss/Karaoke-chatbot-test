name: Karaoke Chatbot Test CI

# 1. 언제 실행할지 설정 (코드가 main 브랜치에 push되거나 업데이트될 때마다 자동으로 실행)
on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  run-chatbot-test:
    runs-on: ubuntu-latest # 깃허브가 제공하는 깨끗한 리눅스 서버 환경 사용

    steps:
    # 2. 업로드한 챗봇 코드를 가상 컴퓨터로 가져옵니다.
    - name: Check out repository code
      uses: actions/checkout@v4

    # 3. 파이썬 환경을 세팅합니다.
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    # 4. 프로그램 구동에 필요한 라이브러리(패키지)를 자동 설치합니다.
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

    # 5. [핵심] 금고(Secrets)에 숨겨둔 실제 API Key들을 가져와 테스트 환경에 주입하고 테스트를 실행합니다.
    - name: Run Tests with API Keys
      env:
        OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        ADMIN_API_KEY: ${{ secrets.ADMIN_API_KEY }}
      run: |
        # 클로드가 만들어준 파일들 중 테스트를 검증하는 명령어를 실행합니다.
        # 파이썬 기본 테스트 도구를 사용해 폴더 내의 테스트 코드를 자동으로 찾아 실행하라는 명령입니다.
        python -m unittest discover -s . -p "*test*.py"
